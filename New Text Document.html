<html>

    </head>
    <body>
        <script>
            //code belongs to w3schools and some me 
            function setCookie(name,val)
            {
            const d = new Date();
            d.setTime = (d.getTime + (4*24*60*60*1000))
            let exDate = d.getUTCDate();
            document.cookie = "username=" + name + "=" + val + ";" + "expires=" + exDate +";" + "path=/";
            }
            function getCookie(cname) 
            {
                let name = cname + "=";
                let decodedCookie = decodeURIComponent(document.cookie);
                let cookieArr = decodedCookie.split(';');
                for (i = 0; i < cookieArr.length; i++)
                {
                    if(cookieArr[i].indexOf(name) > -1)
                    {
                    	return cookieArr[i].substring(cookieArr[i].indexOf(name)+name.length);
                    }
                }
                return 0;
            }
            function setCookieTest()
            {
                setCookie("ham", 0, 2);
            }
            function getCookieTest()
            {
                alert(getCookie("ham"));
            }
        </script>
        <button onclick="setCookieTest()">setCookie</button>
        <button onclick="getCookieTest()">getCookie</button>
    </body>
</html>
